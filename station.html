<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Culture Apparel — Station</title>
<style>
/*
  STANDALONE STATION TABLET PAGE.
  Deliberately separate from index.html so it can't affect the main board.
  A dedicated tablet opens this pinned to its station, e.g.
      https://culture-apparel-preprod.pages.dev/station.html?station=ink
  Auth is server-side: the PIN is validated by /api/station-login, which sets
  an HttpOnly signed cookie. The schedule (/api/station-items) and each status
  write (/api/update-item-status) read that cookie. The station is NEVER trusted
  from the URL for data — the URL only picks which login label/theme to show;
  what you can see and write is decided by the token the server issued.
*/
:root{
  --bg:#0B0B0C;--hdr:#070708;--panel:#121214;--panel2:#0E0E10;
  --chip:#1A1A1C;--line:#262628;--line2:#313134;
  --ink:#ECEAE4;--ink2:#9C988F;--ink3:#6E6A62;--ink4:#5E5C56;
  --red:#C6372B;--red-bg:#2A100D;--red-bd:#7A241C;--red-tx:#E8A89F;
  --grn:#7FA644;--grn-bg:#18230D;--grn-bd:#3D5418;--grn-tx:#BBD382;
  --amb:#C68A30;--amb-bg:#281C09;--amb-bd:#5E4214;--amb-tx:#E0B870;
  --acc:#2E9CCA;              /* set per-station on load */
  --acc-bg:#0C2733;--acc-tx:#BFE4F2;
  --cond:'Oswald',-apple-system,'Segoe UI',sans-serif;
  --sans:'Archivo',-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.hide{display:none!important}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--hdr);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.login-box{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:34px 34px 30px;width:100%;max-width:400px;text-align:center}
.login-badge{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;background:var(--red)}
.login-badge svg{width:30px;height:30px}
.login-station{font-family:var(--cond);font-size:13px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--red)}
.login-title{font-family:var(--cond);font-size:26px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);margin:2px 0 4px}
.login-sub{font-size:12px;color:var(--ink3);margin-bottom:24px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:22px}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid #46443f;transition:all .12s}
.pin-dot.on{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{background:var(--chip);border:1px solid var(--line);color:var(--ink);font-family:var(--cond);font-size:24px;font-weight:600;border-radius:10px;padding:20px 0;cursor:pointer;user-select:none;transition:transform .08s,background .12s}
.key:active{transform:scale(.94);background:var(--red);color:#fff;border-color:var(--red)}
.key.util{font-size:15px;color:var(--ink3);background:transparent}
.key.go{background:var(--red);color:#fff;border-color:var(--red)}
.login-err{min-height:18px;margin-top:14px;font-size:13px;font-weight:500;color:var(--red-tx)}

/* ── BOARD ── */
#board{min-height:100%;display:flex;flex-direction:column}
.bar{background:var(--hdr);border-bottom:2px solid var(--acc);padding:16px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.bar-badge{width:40px;height:40px;border-radius:9px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bar-badge svg{width:22px;height:22px}
.bar-title{font-family:var(--cond);font-size:20px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.bar-sub{font-family:var(--cond);font-size:10px;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--acc);margin-top:3px}
.bar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.pill{background:var(--chip);border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}
.btn-ghost{background:transparent;border:1px solid var(--line2);color:var(--ink2);border-radius:8px;padding:9px 14px;font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}

.wrap{width:100%;max-width:820px;margin:0 auto;padding:20px 18px 40px;flex:1}
.state{text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px}
.state.empty{color:var(--grn-tx)}
.state svg{width:44px;height:44px;display:block;margin:0 auto 12px}

/* item card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.card.busy{opacity:.55;pointer-events:none}
.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.swatch{width:46px;height:46px;border-radius:9px;border:1px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-size:11px;font-weight:700;color:var(--ink2);background:var(--chip);text-align:center;line-height:1.05;padding:3px;overflow:hidden}
.card-id{flex:1;min-width:0}
.pantone{font-family:var(--cond);font-size:20px;font-weight:700;color:var(--ink);letter-spacing:.02em;line-height:1.1}
.ordline{font-size:12px;color:var(--ink2);margin-top:3px}
.ordline b{color:var(--ink);font-weight:600}
.notes{font-size:12px;color:var(--ink3);margin-top:6px;font-style:italic}
.duetag{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.04em;padding:4px 10px;border-radius:20px;background:var(--chip);color:var(--ink2);border:1px solid var(--line)}
.duetag svg{width:13px;height:13px;flex-shrink:0}
.duetag.today{background:var(--amb-bg);color:var(--amb-tx);border-color:var(--amb-bd)}
.duetag.over{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd)}
.duetag.none{opacity:.6}
.stagetag{font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:5px 11px;border-radius:20px;white-space:nowrap;background:var(--acc-bg);color:var(--acc-tx);border:1px solid var(--acc)}

/* stepper */
.steps{display:flex;align-items:flex-start;gap:0;margin:4px 0 16px}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.step .dot{width:16px;height:16px;border-radius:50%;background:#333;border:2px solid #333;z-index:2}
.step.done .dot{background:var(--grn);border-color:var(--grn)}
.step.cur .dot{background:var(--acc);border-color:var(--acc);box-shadow:0 0 0 4px var(--acc-bg)}
.step .lbl{font-size:9.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--ink4);text-align:center;line-height:1.2;max-width:74px}
.step.done .lbl{color:var(--grn-tx)}
.step.cur .lbl{color:var(--acc-tx)}
.step .bar-line{position:absolute;top:7px;left:-50%;width:100%;height:2px;background:#2a2a2c;z-index:1}
.step.done .bar-line,.step.cur .bar-line{background:var(--grn)}
.step:first-child .bar-line{display:none}

.advance{width:100%;background:var(--acc);color:#000;border:none;border-radius:10px;padding:16px;font-family:var(--cond);font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:filter .15s}
.advance:active{filter:brightness(.9)}
.advance.done-btn{background:var(--grn)}
.advance svg{width:17px;height:17px;flex-shrink:0}
.errbtn{width:100%;margin-top:8px;background:transparent;border:1px solid var(--red-bd);color:var(--red-tx);border-radius:10px;padding:11px;font-family:var(--cond);font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.errbtn:active{background:var(--red-bg)}
.errbtn svg{width:15px;height:15px;flex-shrink:0}
.err{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red-tx);border-radius:8px;padding:9px 12px;font-size:12px;margin-top:10px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--grn-bg);border:1px solid var(--grn-bd);color:var(--grn-tx);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:60;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx)}

/* ── COMPACT CARD (summary; opens the modal) ── */
.card-sm{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:background .12s,border-color .12s}
.card-sm:hover{border-color:var(--line2)}
.card-sm:active{background:#16161a}
.card-sm .card-id{flex:1;min-width:0}
.swatch-sm{width:42px;height:42px;font-size:10px}
.pantone-sm{font-size:16px}
.sm-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.sm-chev{color:var(--ink3);font-size:24px;line-height:1;font-family:var(--cond)}

/* ── FULL-SCREEN ITEM MODAL ── */
body.modal-open{overflow:hidden}
.modal{position:fixed;inset:0;z-index:80;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal.busy{pointer-events:none}
.modal.busy .advance,.modal.busy .errbtn{opacity:.45}
.m-card{width:100%;max-width:640px;margin:0 auto;display:flex;flex-direction:column;min-height:100%}
.m-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--hdr);z-index:2}
.m-back{background:transparent;border:1px solid var(--line2);color:var(--ink);border-radius:8px;padding:10px 15px;font-family:var(--cond);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.m-back:active{border-color:var(--acc);color:var(--acc)}
.m-station{margin-left:auto;font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--acc)}
.m-body{padding:22px 20px 44px}
.m-idrow{display:flex;align-items:center;gap:15px;margin-bottom:12px}
.m-swatch{width:66px;height:66px;border-radius:12px;border:1px solid var(--line2);background:var(--chip);display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-size:14px;font-weight:700;color:var(--ink2);flex-shrink:0;text-align:center;padding:4px;line-height:1.05;overflow:hidden}
.m-headline{font-family:var(--cond);font-size:28px;font-weight:700;color:var(--ink);line-height:1.05}
.m-stage{display:flex;justify-content:space-between;align-items:center;background:var(--chip);border:1px solid var(--line);border-radius:10px;padding:12px 15px;margin:16px 0 4px;font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.m-stage span{font-family:var(--cond);font-size:15px;font-weight:600;color:var(--acc-tx);letter-spacing:.02em;text-transform:none}
.m-steps{margin:20px 0 24px}

/* ── GARMENT COUNT-IN extras ── */
.misschip{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.03em;padding:4px 10px;border-radius:20px;background:var(--amb-bg);color:var(--amb-tx);border:1px solid var(--amb-bd)}
.misschip svg{width:13px;height:13px;flex-shrink:0}
.miss-box{background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:10px;padding:14px 15px;margin-top:14px}
.miss-lbl{font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--amb-tx);margin-bottom:8px}
.miss-row{display:flex;gap:8px}
.miss-row input{flex:1;background:var(--ink-bg,#0C0C0D);border:1px solid var(--line2);color:var(--ink);border-radius:8px;padding:11px 12px;font-size:14px;font-family:var(--sans);outline:none}
.miss-row input:focus{border-color:var(--amb)}
.miss-save{background:var(--amb);color:#000;border:none;border-radius:8px;padding:0 18px;font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.sec-lbl{font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin:24px 0 10px;padding-top:16px;border-top:1px solid var(--line)}
.sizewrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
.sizegrid{width:100%;border-collapse:collapse;font-family:var(--cond)}
.sizegrid th,.sizegrid td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:center;font-size:14px;white-space:nowrap}
.sizegrid thead th,.sizegrid tr:first-child th{color:var(--ink3);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.sizegrid .gl{text-align:left;color:var(--ink);font-weight:600;position:sticky;left:0;background:var(--panel)}
.sizegrid td.gl{font-size:13px}
.sizegrid .gt{color:var(--acc-tx);font-weight:700}
.sizegrid td.z{color:var(--ink4)}
.sizegrid tr:last-child td{border-bottom:none}
.sizetotal{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:12px 14px;background:var(--chip);border:1px solid var(--line);border-radius:10px;font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2)}
.sizetotal span{font-size:22px;color:var(--ink);letter-spacing:0}

/* garment tab strip */
.subnav{display:flex;gap:8px;overflow-x:auto;padding:12px 18px;background:var(--hdr);border-bottom:1px solid var(--line);position:sticky;top:74px;z-index:15;-webkit-overflow-scrolling:touch}
.subtab{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;background:var(--chip);border:1px solid var(--line);color:var(--ink2);border-radius:22px;padding:8px 14px;font-family:var(--cond);font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap}
.subtab.on{background:var(--acc);border-color:var(--acc);color:#04140A}
.subtab .tab-ct{font-size:11px;font-weight:700;background:rgba(0,0,0,.22);border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
.subtab:not(.on) .tab-ct{background:var(--bg);color:var(--ink3)}

/* garment 4-way status picker */
.picker{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px}
.pick{border:1.5px solid transparent;border-radius:11px;padding:15px 10px;font-family:var(--cond);font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .08s}
.pick:active{transform:scale(.97)}
.pick.on{cursor:default}

.printbtn{width:100%;margin-top:14px;background:transparent;border:1px solid var(--line2);color:var(--ink);border-radius:10px;padding:13px;font-family:var(--cond);font-size:14px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .15s}
.printbtn:active{border-color:var(--acc);color:var(--acc)}
.printbtn svg{width:17px;height:17px;flex-shrink:0}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login">
  <div class="login-box">
    <div class="login-badge" id="login-badge"></div>
    <div class="login-station" id="login-station">Station</div>
    <div class="login-title" id="login-title">Culture Apparel</div>
    <div class="login-sub">Enter station PIN to continue</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
      <button class="key util" data-k="del">Del</button><button class="key" data-k="0">0</button><button class="key go" data-k="go">&#8594;</button>
    </div>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ── BOARD ── -->
<div id="board" class="hide">
  <div class="bar">
    <div class="bar-badge" id="bar-badge"></div>
    <div style="min-width:0">
      <div class="bar-title" id="bar-title">Ink Station</div>
      <div class="bar-sub">Culture Apparel · Pre-Production</div>
    </div>
    <div class="bar-actions">
      <span class="pill" id="count-pill">—</span>
      <button class="btn-ghost" id="btn-refresh">Refresh</button>
      <button class="btn-ghost" id="btn-lock">Lock</button>
    </div>
  </div>
  <div class="subnav hide" id="subnav"></div>
  <div class="wrap" id="list"><div class="state">Loading schedule…</div></div>
</div>

<div class="toast" id="toast"></div>
<div class="modal hide" id="modal"></div>

<script>
(function(){
'use strict';

/* ── ICONS (inline so there's no font dependency) ── */
const ICON_DROP='<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.8 11a6 6 0 1 0 10.4 0L12 3z"/></svg>';
const ICON_CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>';
const ICON_ALERT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3z"/><path d="M12 10v4"/><path d="M12 17.5v.4"/></svg>';
const ICON_CAL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2"/><path d="M3 9h18"/><path d="M8 2.5v4"/><path d="M16 2.5v4"/></svg>';
const ICON_SCREEN='<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>';
const ICON_TSHIRT='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4l6 2v5h-3v8a1 1 0 0 1 -1 1h-10a1 1 0 0 1 -1 -1v-8h-3v-5l6 -2a3 3 0 0 0 6 0"/></svg>';
const ICON_FLAME='<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c2 -2.96 0 -7 -1 -8c0 3.038 -1.773 4.741 -3 6c-1.226 1.26 -2 3.24 -2 5a6 6 0 1 0 12 0c0 -1.532 -1.056 -3.94 -2 -5c-1.786 3 -2.791 3 -4 2z"/></svg>';
const ICON_BOX='<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4"/><path d="M12 11v10"/></svg>';
const ICON_PRINT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><path d="M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>';

/* ── STATION CONFIG (client-side, for labels/theme only) ──
   The SERVER's STATION_CONFIG is the source of truth for what a token can see
   and write. This mirror only drives the UI (label, accent, the step pipeline
   and button wording). Keep the ink pipeline in sync with _station.js.       */
const STATIONS={
  ink:{
    label:'Ink Station', accent:'#2E9CCA', accentBg:'#0C2733', accentTx:'#BFE4F2',
    icon:ICON_DROP,
    field:'Ink_Sub_Status__c',
    // record field shown as the card's headline + swatch, and its wording
    idField:'Pantone_Color__c', idFallback:'(no Pantone)', idSuffix:'',
    countWord:'to mix', emptyMsg:'All inks mixed — nothing waiting.',
    doneMsg:'Mixed — moved off the board',
    // pipeline stages in order; blank is treated as the first stage

// GOA_Order_Number__c comes back from Salesforce as an <a> anchor; show the text.
function goaText(v){ if(v==null)return''; const m=String(v).match(/>([^<]+)<\/a>/); return (m?m[1]:String(v)).trim(); }

/* ── PRINT DATE ── */
const TODAY_ISO=new Date().toLocaleDateString('en-CA');   // local YYYY-MM-DD
function fmtDate(iso){
  const d=new Date(iso+'T00:00:00');                      // parse as local midnight
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function dueChip(iso){
  if(!iso) return '<div class="duetag none">'+ICON_CAL+'No print date</div>';
  const cls = iso<TODAY_ISO ? 'over' : iso===TODAY_ISO ? 'today' : '';
  const lead = cls==='over' ? 'Overdue · ' : cls==='today' ? 'Today · ' : 'Prints ';
  return '<div class="duetag '+cls+'">'+ICON_CAL+esc(lead+fmtDate(iso))+'</div>';
}

/* ── PIN ENTRY ── */
let pin='';
function drawPin(){ for(let i=0;i<4;i++) $('d'+i).classList.toggle('on',i<pin.length); }
document.querySelector('.pin-grid').addEventListener('click',e=>{
  const b=e.target.closest('[data-k]'); if(!b) return;
  const k=b.dataset.k;
  if(k==='del'){ pin=pin.slice(0,-1); $('login-err').textContent=''; drawPin(); return; }
  if(k==='go'){ submitPin(); return; }
  if(pin.length>=4) return;
  pin+=k; drawPin();
  if(pin.length===4) setTimeout(submitPin,140);
});

async function submitPin(){
  if(pin.length===0) return;
  try{
    const r=await fetch('/api/station-login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({station:STATION,pin})
    });
    if(!r.ok){
      $('login-err').textContent = r.status===401 ? 'Incorrect PIN — try again' : 'Login failed ('+r.status+')';
      pin=''; drawPin();
      setTimeout(()=>{ $('login-err').textContent=''; },2200);
      return;
    }
    pin=''; drawPin();
    showBoard();
  }catch(e){
    $('login-err').textContent='Network error — check connection';
    pin=''; drawPin();
  }
}

/* ── BOARD ── */
function showLogin(){ closeModal(); $('board').classList.add('hide'); $('login').classList.remove('hide'); }
function showBoard(){ $('login').classList.add('hide'); $('board').classList.remove('hide'); loadSchedule(); }

$('btn-refresh').addEventListener('click',loadSchedule);
$('btn-lock').addEventListener('click',showLogin);   // soft lock: re-prompt PIN in the UI

// Tap a compact card -> open the full-screen item modal (delegated, since the
// cards are re-rendered on every refresh).
$('list').addEventListener('click',e=>{

$('subnav').addEventListener('click',e=>{

// Modal controls (back / advance / error / save-missing / set-status / print).
$('modal').addEventListener('click',e=>{
  if(e.target.closest('[data-close]')){ closeModal(); return; }
  const adv=e.target.closest('[data-adv]'); if(adv){ onAdvance({currentTarget:adv}); return; }
  const err=e.target.closest('[data-err]'); if(err){ onError({currentTarget:err}); return; }
  const ss=e.target.closest('[data-setstatus]');
  if(ss){ if(!ss.classList.contains('on')){ const v=ss.dataset.v; writeStatus(ss.dataset.id, v, v===CFG.doneStage?CFG.doneMsg:'Moved to '+v); } return; }
  const pr=e.target.closest('[data-print]'); if(pr){ openSheet(pr.dataset.id); return; }
  const sm=e.target.closest('[data-savemiss]');
  if(sm){

let toastTimer=null;
function toast(msg,isErr){
  const t=$('toast'); t.textContent=msg;
  t.classList.toggle('err',!!isErr);
  t.classList.add('on');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),isErr?2600:1800);
}

async function loadSchedule(opts){
  opts=opts||{};
  const list=$('list');
  const keepY = opts.keepScroll ? window.scrollY : null;   // remember where we are
  if(!opts.keepScroll) list.innerHTML='<div class="state">Loading schedule…</div>';
  try{
    const url = CFG.source==='order' ? '/api/orders' : '/api/station-items';
    const r=await fetch(url,{headers:{Accept:'application/json'}});
    if(r.status===401){ showLogin(); return; }         // no/expired session → PIN
    const d=await r.json();
    if(!r.ok) throw new Error((d&&d.error)||('Failed '+r.status));
    let records=(d.records)||[];
    // Order-based (garment): keep ALL statuses in memory so the per-status tabs
    // (incl. Staged) have data; the active tab does the filtering in displayList.
    render(records);
    if(keepY!=null) window.scrollTo(0,keepY);           // stay put after a status update
  }catch(e){
    if(opts.keepScroll){
      // Silent refresh (after a write) failed — keep the board as-is, just flag it.
      document.querySelectorAll('.card.busy').forEach(c=>c.classList.remove('busy'));
      $('modal').classList.remove('busy');
      toast('Couldn\'t refresh — '+e.message,true);
    } else {
      list.innerHTML='<div class="state" style="color:var(--red-tx)">Could not load schedule: '+esc(e.message)+'</div>';
    }
  }
}

function stageIndex(item){
  const cur=(item[CFG.field]||CFG.stages[0]);
  const i=CFG.stages.indexOf(cur);
  return i<0?0:i;
}

let CURRENT=[];
let garmentView='master';   // active tab for order-based (garment) boards
function render(records){
  CURRENT=records;
  displayList();
  syncModal();   // keep an open modal in step with fresh data (or close it if done)
}

const statusOf=(o)=> o[CFG.field]||CFG.stages[0];
function filterByView(records, view){
  if(view==='master') return records.filter(o=>statusOf(o)!==CFG.doneStatus);
  return records.filter(o=>statusOf(o)===view);
}
function subnavHTML(){
  // Master + each non-done status. Staged (doneStatus) has no tab — a staged
  // order leaves the board — but Staged stays a pickable status in the modal.
  const views=[['master','Master']].concat(
    CFG.stages.filter(s=>s!==CFG.doneStatus).map(s=>[s,s]));
  return views.map(function(pair){
    const v=pair[0], label=pair[1];
    const n=filterByView(CURRENT,v).length;
    return '<button class="subtab'+(garmentView===v?' on':'')+'" data-view="'+esc(v)+'">'
      +esc(label)+'<span class="tab-ct">'+n+'</span></button>';
  }).join('');

function displayList(){
  const list=$('list');

  const sub=$('subnav');
  if(isOrder){ sub.classList.remove('hide'); sub.innerHTML=subnavHTML(); }
  else { sub.classList.add('hide'); }

  const recs = isOrder ? filterByView(CURRENT, garmentView) : CURRENT;
  $('count-pill').textContent = recs.length+' '+(isOrder && garmentView!=='master' ? 'orders' : CFG.countWord);

let modalId=null;
function openModal(id){
  const rec=CURRENT.find(x=>x.Id===id);
  if(!rec) return;
  modalId=id;
  renderModal(rec);
  $('modal').classList.remove('hide');
  document.body.classList.add('modal-open');
}
function renderModal(rec){
  const m=$('modal');
  m.classList.remove('busy');
  m.innerHTML = CFG.source==='order' ? orderDetailInner(rec) : detailInner(rec);
  m.scrollTop=0;
  if(CFG.source==='order') ensureSizes(rec.Id);   // load the garment size summary

function closeModal(){
  modalId=null;
  const m=$('modal'); m.classList.add('hide'); m.classList.remove('busy'); m.innerHTML='';
  document.body.classList.remove('modal-open');
}
// After any refresh: re-render the open modal from fresh data, or close it if
// the item finished and dropped off the schedule.
function syncModal(){
  if(!modalId) return;
  const rec=CURRENT.find(x=>x.Id===modalId);
  if(!rec){ closeModal(); return; }
  // Garment: a staged order drops off every list, so close the modal too.
  if(CFG.source==='order' && statusOf(rec)===CFG.doneStatus){ closeModal(); return; }
  renderModal(rec);
}

  'Not Received':{bg:'#2A100D',tx:'#F0B8B0',bd:'#7A241C'},
  'Partial':     {bg:'#281C09',tx:'#E7C88A',bd:'#5E4214'},

  'Staged':      {bg:'#12240C',tx:'#BBD382',bd:'#3D5418'}
};

/* Garment size breakdown — fetched per order from /api/order-sizes, cached. */
let sizeCache={};
const SIZE_RANK={YXS:0,YS:1,YM:2,YL:3,YXL:4,XS:5,S:6,M:7,L:8,XL:9,'2XL':10,XXL:10,'3XL':11,XXXL:11,'4XL':12,'5XL':13};
function rankOf(s){ return SIZE_RANK[s]==null?99:SIZE_RANK[s]; }
function buildSizeSheet(items){
  const groups={}, seen=new Set();
  (items||[]).forEach(li=>{
    const size=(li.Size__c||'').trim();
    if(!size) return;                       // fee / non-garment line
    const qty=Number(li.Quantity)||0;
    const product=(li.Product2&&li.Product2.Name)||'Item';
    const color=(li.Color__c||'').trim();
    const key=product+'|'+color;
    if(!groups[key]) groups[key]={product,color,sizes:{},total:0};
    groups[key].sizes[size]=(groups[key].sizes[size]||0)+qty;
    groups[key].total+=qty; seen.add(size);
  });
  const sizeCols=[...seen].sort((a,b)=>(rankOf(a)-rankOf(b))||a.localeCompare(b));
  return {groups:Object.values(groups), sizeCols};
}
function sizeGridHTML(sz){
  if(!sz.groups.length) return '<div class="state">No garment breakdown found for this order.</div>';
  const grand=sz.groups.reduce((s,g)=>s+g.total,0);
  const head='<tr><th class="gl"></th>'+sz.sizeCols.map(c=>'<th>'+esc(c)+'</th>').join('')+'<th class="gt">Tot</th></tr>';
  const rows=sz.groups.map(g=>{
    const cells=sz.sizeCols.map(c=>{const q=g.sizes[c]||0;return '<td'+(q?'':' class="z"')+'>'+q+'</td>';}).join('');
    const nm=g.product+(g.color?' · '+g.color:'');
    return '<tr><td class="gl">'+esc(nm)+'</td>'+cells+'<td class="gt">'+g.total+'</td></tr>';
  }).join('');
  return '<div class="sizewrap"><table class="sizegrid">'+head+rows+'</table></div>'
    +'<div class="sizetotal">Total garments<span>'+grand+'</span></div>';
}
async function ensureSizes(orderId){
  if(sizeCache[orderId]!==undefined) return;   // already fetched or in flight
  sizeCache[orderId]=null;                       // in-flight marker
  try{
    const r=await fetch('/api/order-sizes?orderId='+encodeURIComponent(orderId),{headers:{Accept:'application/json'}});
    const d=await r.json();
    sizeCache[orderId]=buildSizeSheet((d&&d.records)||[]);
  }catch(e){ sizeCache[orderId]={error:true}; }
  if(modalId===orderId){
    const g=document.getElementById('size-grid');
    if(g) g.innerHTML = sizeCache[orderId].groups
      ? sizeGridHTML(sizeCache[orderId])
      : '<div class="state" style="color:var(--red-tx)">Couldn\'t load garment summary.</div>';
  }
}

/* ── PRINTABLE ORDER SHEET (paper copy for shipping/receiving) ──
   Opens a new tab with a print-styled size breakdown, like the main board. */
async function openSheet(orderId){
  const rec=CURRENT.find(x=>x.Id===orderId);
  if(!rec) return;
  const w=window.open('','_blank');
  if(!w){ toast('Allow pop-ups to print the sheet',true); return; }
  w.document.write('<p style="font-family:Arial;padding:24px;color:#666">Loading order sheet…</p>');
  try{
    const r=await fetch('/api/order-sizes?orderId='+encodeURIComponent(orderId),{headers:{Accept:'application/json'}});
    const d=await r.json();
    const order={
      goa:  goaText(rec.GOA_Order_Number__c)||rec.OrderNumber||'—',
      name: rec.Customer_Order_Name__c||'',
      account:(rec.Account&&rec.Account.Name)||'',
      printDate:(rec.Print_Date__c||'').slice(0,10)
    };
    const html=sheetHTML(order,(d&&d.records)||[]);
    w.document.open(); w.document.write(html); w.document.close();
  }catch(e){
    w.document.body.innerHTML='<p style="font-family:Arial;padding:24px">Could not load size data.</p>';
  }
}

    const cells=sizeCols.map(function(s){const q=g.sizes[s]||0;return '<td'+(q?'':' class="z"')+'>'+q+'</td>';}).join('');

      +'<tbody><tr><td class="rl">Ordered</td>'+cells+'<td class="tt">'+g.total+'</td></tr></tbody></table></div>';
  }).join('');
  const dateStr = order.printDate ? new Date(order.printDate+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}) : '—';
  return '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Count-In '+e(order.goa)+'</title><style>'
    +'*{box-sizing:border-box;margin:0;padding:0}'
    +'body{font-family:"Helvetica Neue",Arial,sans-serif;color:#141210;background:#e9e6e0;padding:24px}'
    +'.bar{max-width:760px;margin:0 auto 14px;display:flex;justify-content:flex-end}'
    +'.btn{font:600 14px/1 Arial;color:#fff;background:#141210;border:none;border-radius:7px;padding:11px 18px;cursor:pointer}'
    +'.sheet{max-width:760px;margin:0 auto;background:#fff;padding:44px 48px 40px;box-shadow:0 18px 40px -24px rgba(0,0,0,.35)}'
    +'.mast{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #141210;padding-bottom:14px;margin-bottom:20px}'
    +'.brand{font:800 22px/1 Arial;letter-spacing:.14em;text-transform:uppercase}'
    +'.brand small{display:block;font:600 10px/1.4 Arial;letter-spacing:.3em;color:#6b645c;margin-top:6px}'
    +'.tag{text-align:right}.tag .k{font:700 10px/1 Arial;letter-spacing:.26em;text-transform:uppercase;color:#6b645c}.tag .goa{font:800 26px/1 Arial;margin-top:6px}'
    +'.meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 28px;margin-bottom:24px}'
    +'.meta .row{display:flex;justify-content:space-between;border-bottom:1px dotted #cfc7bd;padding:6px 0}'
    +'.meta .l{font:700 10px/1.4 Arial;letter-spacing:.14em;text-transform:uppercase;color:#6b645c}.meta .v{font:600 14px/1.3 Arial;text-align:right}'
    +'.gm{margin-bottom:20px;break-inside:avoid}.gh{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}'
    +'.gh .gt{font:700 16px/1.2 Arial}.gh .gc{font:700 11px/1 Arial;letter-spacing:.05em;text-transform:uppercase;border:1px solid #141210;border-radius:100px;padding:4px 10px}'
    +'table{width:100%;border-collapse:collapse}th,td{border:1.5px solid #141210;text-align:center}'
    +'thead th{background:#f2ede6;font:700 12px/1 Arial;letter-spacing:.06em;text-transform:uppercase;padding:7px 4px;color:#6b645c}'
    +'thead th.tc,tbody td.tt{background:#141210;color:#fff}tbody td{font:700 22px/1 Arial;padding:12px 4px}tbody td.z{color:#c9c1b7;font-weight:400}'
    +'.rl{font:700 10px/1 Arial;letter-spacing:.12em;text-transform:uppercase;color:#6b645c;text-align:left;padding-left:10px;width:70px}'
    +'.grand{display:flex;justify-content:space-between;align-items:center;border-top:3px solid #141210;margin-top:8px;padding-top:14px}'
    +'.grand .gl{font:700 12px/1 Arial;letter-spacing:.14em;text-transform:uppercase;color:#6b645c}.grand .gn{font:800 30px/1 Arial}'
    +'.check{margin-top:22px;border-top:1px dotted #cfc7bd;padding-top:12px;font:600 11px/1 Arial;letter-spacing:.14em;text-transform:uppercase;color:#6b645c}'
    +'.check .line{display:flex;justify-content:space-between;margin-top:14px}.check .box{border-bottom:1px solid #141210;flex:1;margin-left:14px}'
    +'.empty{font:500 14px/1.5 Arial;color:#6b645c;padding:18px 0}'
    +'@media print{@page{margin:14mm}body{background:#fff;padding:0}.bar{display:none}.sheet{box-shadow:none;max-width:none;padding:0}.gm{break-inside:avoid}}'
    +'</style></head><body>'
    +'<div class="bar"><button class="btn" onclick="window.print()">Print / Save PDF</button></div>'
    +'<div class="sheet">'
      +'<div class="mast"><div class="brand">Culture Apparel<small>Garment Count-In Sheet</small></div>'
        +'<div class="tag"><div class="k">GOA Order</div><div class="goa">'+e(order.goa)+'</div></div></div>'
      +'<div class="meta">'
        +'<div class="row"><span class="l">Order</span><span class="v">'+e(order.name||'—')+'</span></div>'
        +'<div class="row"><span class="l">Account</span><span class="v">'+e(order.account||'—')+'</span></div>'

      +(groups.length?'<div class="grand"><span class="gl">Total Garments</span><span class="gn">'+grand+'</span></div>':'')
      +'<div class="check"><div>Count-in verification</div>'
        +'<div class="line"><span>Counted by</span><span class="box"></span></div>'
        +'<div class="line"><span>Missing / notes</span><span class="box"></span></div>'
      +'</div>'
    +'</div></body></html>';
}

async function onAdvance(e){
  const b=e.currentTarget;
  const itemId=b.dataset.id, next=b.dataset.next;
  await writeStatus(itemId, next,
    next===CFG.doneStage ? CFG.doneMsg : 'Updated: '+next);
}

// "Mixing Error" — bounce the ink back to the start of the pipeline.
async function onError(e){
  const b=e.currentTarget;
  const itemId=b.dataset.id, back=b.dataset.back;
  await writeStatus(itemId, back, 'Reset — back to '+back);
}

// Shared write: POST a status change, toast on success, refetch the board.
// For order-based stations (garment) this targets /api/update-order-receiving
// and can carry the free-text missing note; otherwise it hits the item endpoint.
async function writeStatus(itemId, value, okMsg, extra){
  const card=$('card-'+itemId);
  if(card) card.classList.add('busy');
  if(modalId===itemId) $('modal').classList.add('busy');
  try{
    const isOrder = CFG.source==='order';
    const url = isOrder ? '/api/update-order-receiving' : '/api/update-item-status';
    const body = isOrder
      ? { orderId:itemId, status:value, missing: extra && extra.missing }
      : { itemId, subStatus:value };
    const r=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(r.status===401){ showLogin(); return; }
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.ok) throw new Error((d&&d.error)||('Save failed '+r.status));
    toast(okMsg);
    // Re-pull the board (a finished item drops off), holding scroll; render()
    // then re-syncs the open modal or closes it if the item is done.
    await loadSchedule({keepScroll:true});
  }catch(err){
    if(card) card.classList.remove('busy');
    if(modalId===itemId) $('modal').classList.remove('busy');
    toast('Couldn\'t save — '+err.message, true);
  }
}

/* ── INIT ──
   Always start at the PIN pad. A page refresh should require re-entering the
   PIN rather than auto-resuming into the board. (Note: the signed session cookie
   can still be valid server-side until it expires — this is a UI gate. If you
   want a refresh to fully end the session server-side, that's a small
   station-logout endpoint; ask and I'll add it.) */
showLogin();
