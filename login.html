<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#08080A;font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#ECEAE4}
    a{color:#E24A3A;text-decoration:none}
    .ti{font-size:inherit;line-height:1;display:inline-block}
    input{font-family:inherit}
    input::placeholder{color:#4d483f}
    @keyframes ca-shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
    @keyframes ca-fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</helmet>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 50% 0%,#141417,#08080A 60%)">

  <sc-if value="{{screenPin}}" hint-placeholder-val="{{ true }}">
    <div style="width:100%;max-width:400px;animation:ca-fade .25s ease">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:30px">
        <svg width="60" height="60" viewBox="0 0 48 48" aria-hidden="true"><g fill="#C6372B"><rect x="12" y="9" width="24" height="3.1" rx="1.5"/><rect x="8" y="14" width="32" height="3.1" rx="1.5"/><rect x="5" y="19" width="38" height="3.1" rx="1.5"/><rect x="5" y="24" width="38" height="3.1" rx="1.5"/><rect x="6" y="29" width="36" height="3.1" rx="1.5"/><rect x="9" y="34" width="30" height="3.1" rx="1.5"/><rect x="13" y="39" width="22" height="3.1" rx="1.5"/></g></svg>
        <div style="text-align:center">
          <div style="font:700 22px/1 'Oswald';letter-spacing:.12em;color:#ECEAE4">CULTURE APPAREL</div>
          <div style="font:500 10px/1 'Oswald';letter-spacing:.36em;text-transform:uppercase;color:#C6372B;margin-top:7px">Production Floor</div>
        </div>
      </div>
      <div style="background:#0D0D0F;border:1px solid #1f1f23;border-radius:18px;padding:30px 28px;box-shadow:0 40px 90px -30px rgba(0,0,0,.8)">
        <div style="font:500 12px/1.4 'Archivo';color:#8a8378;text-align:center;margin-bottom:22px">Enter your PIN to continue</div>
        <div style="display:flex;justify-content:center;gap:14px;margin-bottom:8px;animation:{{shakeAnim}}">
          <sc-for list="{{dots}}" as="d" hint-placeholder-count="4">
            <div style="width:15px;height:15px;border-radius:50%;border:2px solid {{d.border}};background:{{d.bg}};transition:all .12s"></div>
          </sc-for>
        </div>
        <div style="height:20px;text-align:center;font:600 11px/20px 'Oswald';letter-spacing:.06em;text-transform:uppercase;color:#E8A89F;margin-bottom:14px">{{err}}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
          <sc-for list="{{pad}}" as="p" hint-placeholder-count="12">
            <button onClick="{{ p.onPress }}" style="background:{{p.bg}};border:1px solid {{p.border}};color:{{p.color}};font:600 24px/1 'Oswald';border-radius:12px;padding:20px 0;cursor:pointer;transition:transform .08s" style-active="transform:scale(.94)"><sc-if value="{{p.isIcon}}" hint-placeholder-val="{{ false }}"><i class="ti {{p.icon}}"></i></sc-if><sc-if value="{{p.isText}}" hint-placeholder-val="{{ true }}">{{p.label}}</sc-if></button>
          </sc-for>
        </div>
      </div>
      <div style="text-align:center;font:400 11px/1.5 'Archivo';color:#4d483f;margin-top:18px">Worker PIN <span style="color:#6C665C">1234</span> · Manager PIN <span style="color:#6C665C">6767</span></div>
    </div>
  </sc-if>

  <sc-if value="{{screenName}}" hint-placeholder-val="{{ false }}">
    <div style="width:100%;max-width:400px;animation:ca-fade .25s ease">
      <div style="background:#0D0D0F;border:1px solid #1f1f23;border-radius:18px;padding:34px 30px;text-align:center;box-shadow:0 40px 90px -30px rgba(0,0,0,.8);position:relative;overflow:hidden">
        <div style="position:absolute;top:0;left:0;right:0;height:4px;background:#C6372B"></div>
        <div style="width:52px;height:52px;border-radius:14px;background:#1a1a1e;border:1px solid #2a2a2f;display:flex;align-items:center;justify-content:center;margin:0 auto 18px"><i class="ti ti-user" style="color:#C6372B;font-size:26px"></i></div>
        <div style="font:600 21px/1.1 'Oswald';color:#ECEAE4;margin-bottom:8px">Who's this?</div>
        <div style="font:400 12px/1.5 'Archivo';color:#8a8378;margin-bottom:22px">Enter your name so changes made this shift can be traced back to you.</div>
        <input value="{{name}}" onInput="{{ onName }}" onKeyDown="{{ onNameKey }}" placeholder="Your first name" style="width:100%;background:#16161a;border:1px solid #2a2a2f;border-radius:11px;padding:14px;font-size:16px;color:#ECEAE4;text-align:center;outline:none;margin-bottom:14px">
        <button onClick="{{ onSubmitName }}" style="width:100%;font:700 13px/1 'Oswald';letter-spacing:.09em;text-transform:uppercase;color:#fff;background:#C6372B;border:none;border-radius:11px;padding:15px;cursor:pointer" style-hover="filter:brightness(1.1)">Continue</button>
        <div style="height:18px;font:600 11px/18px 'Oswald';letter-spacing:.05em;text-transform:uppercase;color:#E8A89F;margin-top:8px">{{nameErr}}</div>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{screenDone}}" hint-placeholder-val="{{ false }}">
    <div style="width:100%;max-width:420px;animation:ca-fade .25s ease">
      <div style="background:#0D0D0F;border:1px solid #1f1f23;border-radius:18px;padding:32px 30px;box-shadow:0 40px 90px -30px rgba(0,0,0,.8)">
        <div style="display:flex;align-items:center;gap:13px;margin-bottom:24px">
          <span style="width:48px;height:48px;border-radius:50%;background:{{roleColor}};color:#08080A;font:700 15px/48px 'Oswald';text-align:center;flex-shrink:0">{{nameInit}}</span>
          <div style="min-width:0">
            <div style="font:600 19px/1 'Oswald';color:#ECEAE4">Welcome, {{name}}</div>
            <div style="display:inline-flex;align-items:center;gap:6px;font:600 9px/1 'Oswald';letter-spacing:.1em;text-transform:uppercase;color:{{roleColor}};background:{{roleBg}};border:1px solid {{roleBorder}};border-radius:6px;padding:5px 9px;margin-top:9px"><i class="ti {{roleIcon}}"></i>{{roleLabel}}</div>
          </div>
          <button onClick="{{ onLogout }}" style="margin-left:auto;flex-shrink:0;font:600 10px/1 'Oswald';letter-spacing:.07em;text-transform:uppercase;color:#8a8378;background:transparent;border:1px solid #2a2a2f;border-radius:8px;padding:9px 11px;cursor:pointer" style-hover="border-color:#C6372B;color:#C6372B"><i class="ti ti-logout"></i></button>
        </div>
        <div style="font:600 10px/1 'Oswald';letter-spacing:.14em;text-transform:uppercase;color:#4d483f;margin-bottom:12px">Open a board</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          <sc-for list="{{boards}}" as="b" hint-placeholder-count="3">
            <a href="{{b.href}}" style="display:flex;align-items:center;gap:13px;background:#141417;border:1px solid #232327;border-left:4px solid {{b.color}};border-radius:11px;padding:15px 16px" style-hover="border-color:#3a3a40;border-left-color:{{b.color}}">
              <i class="ti {{b.icon}}" style="color:{{b.color}};font-size:20px"></i>
              <div style="min-width:0"><div style="font:600 15px/1 'Oswald';color:#ECEAE4">{{b.label}}</div><div style="font:400 11px/1 'Archivo';color:#6C665C;margin-top:4px">{{b.sub}}</div></div>
              <i class="ti ti-arrow-right" style="margin-left:auto;color:#4d483f;font-size:17px"></i>
            </a>
          </sc-for>
        </div>
      </div>
    </div>
  </sc-if>
</div>

<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#C6372B"/><text x="50" y="60" font-family="Oswald,Arial" font-size="30" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">CA</text><text x="50" y="78" font-family="Arial" font-size="9" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">LOGIN</text></svg></template></x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  constructor(props){ super(props); this.state={ screen:'pin', pin:'', role:null, name:'', err:'', nameErr:'', shake:false }; }
  componentDidMount(){ this._kd=(e)=>this.onKey(e); window.addEventListener('keydown',this._kd); try{ const r=localStorage.getItem('caShopRole'), n=localStorage.getItem('caShopWorkerName'); if(r&&n) this.setState({role:r,name:n,screen:'done'}); }catch(_){} }
  componentWillUnmount(){ window.removeEventListener('keydown',this._kd); }
  onKey(e){ if(this.state.screen!=='pin') return; if(/^[0-9]$/.test(e.key)) this.press(e.key); else if(e.key==='Backspace') this.backspace(); }
  press(d){ if(this.state.pin.length>=4) return; const pin=this.state.pin+d; this.setState({pin,err:''}); if(pin.length===4) setTimeout(()=>this.submit(pin),140); }
  backspace(){ this.setState(st=>({pin:st.pin.slice(0,-1),err:''})); }
  submit(pin){ let role=null; if(pin==='1234') role='worker'; else if(pin==='6767') role='manager'; if(role){ try{localStorage.setItem('caShopRole',role);}catch(_){} this.setState({role,pin:'',screen:'name'}); } else { this.setState({err:'Incorrect PIN — try again',pin:'',shake:true}); setTimeout(()=>this.setState({shake:false}),500); } }
  setName(v){ this.setState({name:v,nameErr:''}); }
  submitName(){ const nm=this.state.name.trim(); if(!nm){ this.setState({nameErr:'Enter your name to continue'}); return; } try{localStorage.setItem('caShopWorkerName',nm.slice(0,80));}catch(_){} this.setState({screen:'done'}); }
  logout(){ try{localStorage.removeItem('caShopRole');localStorage.removeItem('caShopWorkerName');}catch(_){} this.setState({screen:'pin',pin:'',role:null,name:'',err:'',nameErr:''}); }

  renderVals(){
    const st=this.state;
    const dots=[0,1,2,3].map(i=>{ const f=i<st.pin.length; return { filled:f, bg:f?'#C6372B':'transparent', border:f?'#C6372B':'#3a3a40' }; });
    const keys=['1','2','3','4','5','6','7','8','9'];
    const pad=keys.map(k=>({ label:k, isText:true, isIcon:false, onPress:()=>this.press(k), bg:'#16161a', border:'#242428', color:'#ECEAE4' }));
    pad.push({ label:'', isText:false, isIcon:true, icon:'ti-backspace', onPress:()=>this.backspace(), bg:'transparent', border:'#242428', color:'#8a8378' });
    pad.push({ label:'0', isText:true, isIcon:false, onPress:()=>this.press('0'), bg:'#16161a', border:'#242428', color:'#ECEAE4' });
    pad.push({ label:'', isText:false, isIcon:true, icon:'ti-arrow-right', onPress:()=>{ if(st.pin.length===4) this.submit(st.pin); }, bg:'#C6372B', border:'#C6372B', color:'#08080A' });

    const isMgr=st.role==='manager';
    const boards=[
      { label:'Pre-Production', sub:'Films · screens · receiving', href:'pre-production.html', color:'#C9923A', icon:'ti-clipboard-check' },
      { label:'Production Dashboard', sub:'Kanban · print → ship', href:'index.html', color:'#C6372B', icon:'ti-layout-kanban' },
      { label:'Station Board', sub:'Ink · screens · transfers', href:'station.html', color:'#5E9B9A', icon:'ti-device-tablet' },
    ];
    const nm=st.name.trim();
    return {
      screenPin:st.screen==='pin', screenName:st.screen==='name', screenDone:st.screen==='done',
      dots, pad, err:st.err, shakeAnim: st.shake?'ca-shake .45s':'none',
      name:st.name, onName:(e)=>this.setName(e.target.value), onNameKey:(e)=>{ if(e.key==='Enter') this.submitName(); }, onSubmitName:()=>this.submitName(), nameErr:st.nameErr,
      nameInit:(nm[0]||'?').toUpperCase(),
      roleLabel:isMgr?'Manager':'Worker', roleIcon:isMgr?'ti-shield-check':'ti-user-check',
      roleColor:isMgr?'#C6372B':'#7FA644', roleBg:isMgr?'#2A100D':'#18230D', roleBorder:isMgr?'#7A241C':'#3D5418',
      boards, onLogout:()=>this.logout(),
    };
  }
}
</script>
</body>
</html>
