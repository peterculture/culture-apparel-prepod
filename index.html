<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture Apparel — Production Dashboard</title>
<link rel="stylesheet" href="tabler-icons.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#0B0B0C;--hdr:#070708;--nav:#0E0E10;--panel:#121214;--ink-bg:#0C0C0D;
 --chip:#1A1A1C;--line:#262628;--line2:#313134;
 --ink:#ECEAE4;--ink2:#9C988F;--ink3:#6E6A62;--ink4:#5E5C56;
 --red:#C6372B;--red-hot:#E24A3A;--red-bg:#2A100D;--red-bd:#7A241C;--red-tx:#E8A89F;
 --grn:#7FA644;--grn-bg:#18230D;--grn-bd:#3D5418;--grn-tx:#BBD382;
 --amb:#C68A30;--amb-bg:#281C09;--amb-bd:#5E4214;--amb-tx:#E0B870;
 --rad-lg:8px;--rad-md:6px;--rad-sm:4px;
 --cond:'Oswald',-apple-system,sans-serif;--sans:'Archivo',-apple-system,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:.005em}
.hdr{background:var(--hdr);border-bottom:1px solid var(--red);padding:16px 28px;display:flex;align-items:center;gap:16px}
.logo{width:44px;height:40px;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:100%;height:100%;display:block;filter:drop-shadow(0 0 9px rgba(198,55,43,.4))}
.app-title{font-family:var(--cond);font-size:20px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-sub{font-family:var(--cond);font-size:11px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--red);margin-top:4px}
.conn-badge{margin-left:auto;background:transparent;border:1px solid var(--line);border-radius:var(--rad-sm);padding:6px 10px;font-family:var(--cond);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);display:flex;align-items:center;gap:7px;flex-shrink:1;min-width:0;overflow:hidden}
.sf-dot{width:8px;height:8px;border-radius:50%;background:#3A3A3D;flex-shrink:0}
.sf-dot.on{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.sf-dot.err{background:var(--red-hot);box-shadow:0 0 6px var(--red-hot)}
.sf-dot.load{background:var(--amb);box-shadow:0 0 6px var(--amb);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.top-nav{background:var(--nav);border-bottom:1px solid var(--line);padding:0 28px;display:flex;gap:2px;overflow-x:auto}
.ttab{display:inline-flex;align-items:center;gap:9px;padding:15px 22px;font-family:var(--cond);font-size:14px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--ink2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none;white-space:nowrap}
.ttab:hover{color:var(--ink)}
.ttab.on{color:var(--ink);border-bottom-color:var(--red)}
.tcount{background:var(--chip);color:var(--ink2);font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;margin-left:2px}
.ttab.on .tcount{background:var(--red);color:#000}
.page{padding:24px 28px;max-width:1240px;margin:0 auto;width:100%}
.sec{display:none}.sec.on{display:block}
.sf-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad-lg);padding:22px;margin-bottom:22px}
.btn-ref{background:transparent;border:1px solid var(--line2);color:var(--ink);padding:9px 16px;border-radius:var(--rad-sm);font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.btn-ref:hover{border-color:var(--red);color:var(--red)}
.msg-err{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--rad-sm);padding:9px 13px;font-size:12px;color:var(--red-tx);margin-top:10px}
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--cond);font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:var(--rad-sm)}
.empty{font-size:13px;color:var(--ink4);padding:14px 4px}
.meth-hdr{display:flex;align-items:center;gap:9px;font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin:22px 0 10px}
.meth-hdr:first-child{margin-top:0}
.meth-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ocard{border-radius:var(--rad-md);margin-bottom:9px;overflow:hidden;border:1px solid var(--line)}
.ohdr{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;user-select:none;font-family:var(--cond);letter-spacing:.02em;transition:filter .15s;background:var(--chip)}
.ohdr:hover{filter:brightness(1.25)}
.odet{padding:16px;display:none;border-top:1px solid var(--line);background:var(--ink-bg)}
.odet.on{display:block}
.chev{font-size:15px;margin-left:auto;transition:transform .2s;opacity:.6}
.chev.on{transform:rotate(180deg)}
.fieldlbl{font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.07em;font-family:var(--cond)}
.fieldwrap{margin-bottom:16px}
input,textarea,select{border-radius:var(--rad-sm);border:1px solid var(--line);padding:10px 12px;font-size:13px;width:100%;font-family:var(--sans);color:var(--ink);background:var(--ink-bg);outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--red)}
textarea{resize:vertical;min-height:70px}
.ckrow{display:flex;align-items:center;gap:10px;background:var(--chip);border:1px solid var(--line);border-radius:var(--rad-sm);padding:11px 14px;margin-bottom:10px;cursor:pointer}
.cktog{width:22px;height:22px;border-radius:5px;border:2px solid var(--ink4);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cktog.ck{background:var(--red-bg);border-color:var(--red);color:var(--red-tx)}
.sav-tag{font-size:10px;color:var(--amb-tx);margin-left:6px}
.actbtn{width:100%;background:var(--red);color:#fff;border:none;border-radius:var(--rad-sm);padding:13px;font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s;margin-top:6px}
.actbtn:hover{filter:brightness(1.12)}
.actbtn.ghost{background:transparent;border:1px solid var(--line2);color:var(--ink)}
.actbtn.ghost:hover{border-color:var(--red);color:var(--red)}
.pp-mini{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:var(--rad-sm);padding:9px 12px;margin-bottom:6px;font-size:12px}
.pp-mini b{font-family:var(--cond);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);min-width:78px}
.hint{font-size:11px;color:var(--ink4);margin-top:-10px;margin-bottom:16px}
.stepbar{display:flex;gap:3px;margin-bottom:18px}
.stepseg{flex:1;text-align:center;padding:7px 2px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* login (same as pre-production dashboard) */
#login-screen{position:fixed;inset:0;background:#070708;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-box{background:#0E0E10;border:1px solid #262628;border-radius:12px;padding:36px 40px;width:100%;max-width:380px;text-align:center}
.login-logo{width:56px;height:56px;background:#C6372B;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.login-title{font-family:var(--cond,'Oswald',sans-serif);font-size:22px;font-weight:700;color:#ECEAE4;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.login-sub{font-size:12px;color:#6E6A62;margin-bottom:28px}
.pin-display{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #444441;background:transparent;transition:all .15s}
.pin-dot.filled{background:#C6372B;border-color:#C6372B}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.pin-btn{background:#1A1A1C;border:1px solid #262628;color:#ECEAE4;font-family:var(--cond,'Oswald',sans-serif);font-size:20px;font-weight:600;border-radius:8px;padding:16px;cursor:pointer;transition:all .15s;user-select:none}
.pin-btn:hover{background:#262628;border-color:#444441}
.pin-btn:active{transform:scale(.95);background:#C6372B;color:#000;border-color:#C6372B}
.pin-clear{background:transparent;border:1px solid #262628;color:#6E6A62;font-size:13px;font-weight:500;border-radius:8px;padding:16px;cursor:pointer;transition:all .15s}
.pin-clear:hover{color:#ECEAE4;border-color:#444441}
.login-err{color:#E8A89F;font-size:12px;font-weight:500;margin-top:8px;min-height:18px}
.login-hint{font-size:11px;color:#444441;margin-top:16px}
@media(max-width:760px){.page{padding:16px}.hdr,.top-nav{padding-left:16px;padding-right:16px}}
</style>
</head>

<script>
(function(){

/* ══════════════════════════════════════
   LOGIN — shared across this dashboard and the Pre-Production Dashboard.
   Logging in here (or there) stores the role in localStorage (same origin,
   so both pages see it), so staff only enter a PIN once per shift instead of
   once per page.
══════════════════════════════════════ */
let pinBuffer='';
const WORKER_PIN='1234';
const MANAGER_PIN='6767';
const CA_ROLE_KEY='caShopRole';
window.pinPress=function(d){
  if(pinBuffer.length>=4) return;
  pinBuffer+=d;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(pinSubmit,120);
};
window.pinClear=function(){
  pinBuffer=pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('login-err').textContent='';
};
window.pinSubmit=function(){
  let role=null;
  if(pinBuffer===WORKER_PIN) role='worker';
  else if(pinBuffer===MANAGER_PIN) role='manager';
  if(role){
    try{localStorage.setItem(CA_ROLE_KEY,role);}catch(_){}
    enterApp();
  } else {
    document.getElementById('login-err').textContent='Incorrect PIN — try again';
    pinBuffer='';
    updatePinDots();
    setTimeout(()=>document.getElementById('login-err').textContent='',2000);
  }
};
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  initApp();
}
function updatePinDots(){
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);
}
window.doLogout=function(){
  pinBuffer='';updatePinDots();
  try{localStorage.removeItem(CA_ROLE_KEY);}catch(_){}
  document.getElementById('login-err').textContent='';
  document.getElementById('app-shell').style.display='none';
  document.getElementById('login-screen').style.display='flex';
};

/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const STAGE_KEY={'Ready for Print':'rfp','In Production':'ip','Post-Production':'pp','Completed':'done'};
const STAGES=['rfp','ip','pp','done'];
// Order_Substatus__c's "In Production" picklist entry has a display label that
// no longer matches its actual stored API value -- Salesforce shows "In
// Production" but the real value is "Production" (relabeled by Peter Larson,
// 7/12/2026, without updating the underlying API name). Writing the literal
// label fails with INVALID_OR_NULL_FOR_RESTRICTED_PICKLIST. Every other stage's
// label already matches its value. Route all reads/writes through these maps
// so the UI keeps showing "In Production" everywhere while the real API value
// gets sent/parsed correctly. Confirmed via ui-api/object-info, 2026-07-14.
const SUBSTATUS_VALUE={'Pre-Production':'Pre-Production','Ready for Print':'Ready for Print','In Production':'Production','Post-Production':'Post-Production','Completed':'Completed'};
const SUBSTATUS_LABEL=Object.fromEntries(Object.entries(SUBSTATUS_VALUE).map(([label,val])=>[val,label]));
const METH_COLOR={sp:'#C6372B',em:'#5E8B8A',hp:'#C68A30'};
const METH_LABEL={sp:'Screen Print',em:'Embroidery',hp:'Heat Press'};
// Canonical size column order for the garment size-breakdown table; any size
// value not in this list (or blank) falls into "Other".
const SIZE_ORDER=['XS','S','M','L','XL','2XL','3XL','4XL','5XL'];
let ALL=[];
let curStage='rfp';
let openO={};
let ppItems={};
let pkgItems={},pkgSaving={},pkgErr={};
let shipItems={},shipSaving={},shipErr={};
// Completed tab: per-order toggle for the "Inspect Order Details" drill-down
// (production items, packaging, shipments, timers, mockup, order sheet, etc.)
// so the backlog list stays a quick-scan list until someone wants the full record.
let doneInspect={};

// Field ID Salesforce uses to prefill the Order lookup on the Zenkraft
// "Shipment Wizard" Visualforce page via URL (captured live off the real
// "New" button on an Order's Shipments related list, 2026-07-14). Actual
// label purchase (rate shopping + buying real postage via FedEx/UPS/USPS)
// only happens inside that wizard, never in this app -- see shipSection().
// NOTE: this VF domain is sandbox-specific; update it if/when this org
// moves to production.
const ZK_WIZARD_FIELD_ID='00NRi000001mOHB';
function zkWizardUrl(o){
  const orderId15=(o.id||'').slice(0,15);
  const qs=new URLSearchParams({
    ['CF'+ZK_WIZARD_FIELD_ID]:o.sfNum||o.num||'',
    ['CF'+ZK_WIZARD_FIELD_ID+'_lkid']:orderId15,
    navigationLocation:'RELATED_LIST',
    lexiSObjectName:'zkmulti__MCShipment__c',
    lexiActionName:'new',
    'sfdc.override':'1',
  });
  return 'https://cultureapparel--dev2--zkmulti.sandbox.vf.force.com/apex/Wizard?'+qs.toString();
}
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── Live production timers ──
   Print_Setup_Timer__c / Production_Timer__c are plain whole-number fields
   in Salesforce, stored here in whole SECONDS (not minutes) so a stop
   preserves exact minute-and-second precision instead of rounding. There's
   no live stopwatch field on the Order itself, so "running" state lives
   only in this browser (persisted to localStorage so a refresh doesn't
   lose an in-progress timer). Stopping a timer writes the exact elapsed
   seconds, added to whatever was already logged, back to Salesforce. */
const TIMER_LS_KEY='ca_prod_timers_v1';
function loadTimerRun(){ try{ return JSON.parse(localStorage.getItem(TIMER_LS_KEY)||'{}'); }catch(_){ return {}; } }
function saveTimerRun(){ try{ localStorage.setItem(TIMER_LS_KEY,JSON.stringify(timerRun)); }catch(_){} }
let timerRun=loadTimerRun();
const timerKey=(oid,kind)=>oid+':'+kind;
function timerElapsedSec(o,kind){
  const baseSec=(kind==='setup'?o.setupTimer:o.timer)||0;
  const startedAt=timerRun[timerKey(o.id,kind)];
  const liveSec=startedAt?Math.floor((Date.now()-startedAt)/1000):0;
  return baseSec+liveSec;
}
function fmtHMS(totalSec){
  totalSec=Math.max(0,Math.round(totalSec));
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60),s=totalSec%60;
  const pad=n=>String(n).padStart(2,'0');
  return h>0?h+':'+pad(m)+':'+pad(s):m+':'+pad(s);
}
// Human-readable "logged so far" readout with exact minute+second
// precision, e.g. "8m 32s" or "1h 5m 12s".
function fmtMinSec(totalSec){
  totalSec=Math.max(0,Math.round(totalSec||0));
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60),s=totalSec%60;
  const parts=[];
  if(h>0) parts.push(h+'h');
  if(h>0||m>0) parts.push(m+'m');
  parts.push(s+'s');
  return parts.join(' ');
}

/* ══════════════════════════════════════
   WRITE BACK — same optimistic-save pattern as the Pre-Production Dashboard
══════════════════════════════════════ */
async function patchField(sid,field,val,o,key){
  o.sav[key]=true;renderCur();
  const body={};body[field]=val;
  try{
    const r=await fetch('/api/orders/'+encodeURIComponent(sid),{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    if(!r.ok&&r.status!==204){let m='Update failed';try{const e=await r.json();m=(e&&e.error)||m;}catch(_){}throw new Error(m);}
    o[key]=val;
  }catch(e){alert('Sync error: '+e.message);}
  finally{o.sav[key]=false;renderCur();}
}

// Moving stages re-buckets the order (or drops it off this dashboard, for Pre-Production).
async function advanceStage(o,newSubstatus){
  o.sav.substatus=true;renderCur();
  try{
    const body={Order_Substatus__c:SUBSTATUS_VALUE[newSubstatus]||newSubstatus};
    // Moving back to Pre-Production must also clear the checklist fields.
    // Salesforce's "RECORDTRIGGER ORDER Production Status" flow auto-promotes
    // Order_Substatus__c back to "Ready for Print" the instant it sees the
    // checklist fields (Films Printed / Screens Completed / Mix Inks, Digitize
    // File / Thread & Materials, Transfers Received / Ready) still marked
    // complete -- so without this, the revert gets silently overwritten by
    // Salesforce within the same save. Reset all of them (not just this
    // order's method) since an order can have multiple production tracks.
    // Confirmed via OrderHistory + Flow Builder, 2026-07-14.
    if(newSubstatus==='Pre-Production'){
      Object.assign(body,{
        Films_Printed__c:false,Screens_Completed__c:false,Mix_Inks__c:false,
        Digitize_File__c:false,Thread_Color_Materials__c:false,
        Transfers_Received__c:false,Transfers_Ready__c:false,
      });
    }
    // If a print-setup or production timer is still running on this order,
    // stop and fold its elapsed time into this same PATCH so moving stages
    // never silently drops time that was never explicitly "Stopped".
    ['setup','prod'].forEach(kind=>{
      const key=timerKey(o.id,kind);
      const startedAt=timerRun[key];
      if(!startedAt) return;
      const liveSec=Math.max(0,Math.floor((Date.now()-startedAt)/1000));
      const savKey=kind==='setup'?'setupTimer':'timer';
      const field=kind==='setup'?'Print_Setup_Timer__c':'Production_Timer__c';
      const newSec=(o[savKey]||0)+liveSec;
      body[field]=newSec;
      o[savKey]=newSec;
      delete timerRun[key];
    });
    saveTimerRun();
    const r=await fetch('/api/orders/'+encodeURIComponent(o.id),{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    if(!r.ok&&r.status!==204){let m='Update failed';try{const e=await r.json();m=(e&&e.error)||m;}catch(_){}throw new Error(m);}
    o.substatus=newSubstatus;
    o.stageKey=STAGE_KEY[newSubstatus]||null;
    openO[o.id]=false;
  }catch(e){alert('Sync error: '+e.message);}
  finally{o.sav.substatus=false;updateCounts();renderCur();}
}

// Overdue orders first (earliest print date first), then everyone else by
// print date ascending (no date last) — mirrors the Pre-Production Dashboard.
function sortByPriority(arr){
  const od=arr.filter(isOD).sort((a,b)=>a.due<b.due?-1:1);
  const rest=arr.filter(o=>!isOD(o)).sort((a,b)=>{
    if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;
    return a.due<b.due?-1:a.due>b.due?1:0;
  });
  return [...od,...rest];
}

  const el=document.getElementById('sec-'+curStage);

/* ── Printable order sheet ──
   Same look as the Pre-Production Dashboard's order sheet: cream/white
   "sheet" card, bold black-bordered garment size grids, GOA tag, mockup,
   grand-total banner. Pulls its rows from the same /api/order-sizes
   endpoint (OrderItem-based) rather than the card's own blanks data, so
   both dashboards render from an identical source. */

// Canonical size ordering; unknown sizes fall to the end, then A–Z.
const SIZE_RANK={YXS:0,YS:1,YM:2,YL:3,YXL:4,XS:5,S:6,M:7,L:8,XL:9,
                 '2XL':10,XXL:10,'3XL':11,XXXL:11,'4XL':12,'5XL':13};

// Group OrderItem rows into a size grid.
// Rows with a blank Size__c are non-garment lines (fees/upcharges) and are
// kept out of the grid — surfaced separately as fees.
function buildSizeSheet(items){
  const groups={}, fees=[], seen=new Set();
  (items||[]).forEach(li=>{
    const size=(li.Size__c||'').trim();
    const qty=Number(li.Quantity)||0;
    if(!size){
      fees.push({name:li.Description||(li.Product2&&li.Product2.Name)||'Fee',unit:Number(li.UnitPrice)||0});
      return;
    }
    const product=(li.Product2&&li.Product2.Name)||'Item';
    const color=(li.Color__c||'').trim();
    const design=(li.Design__r&&li.Design__r.Name)||'';
    const key=design+'|'+product+'|'+color;
    if(!groups[key]) groups[key]={product,color,design,sizes:{},total:0};
    groups[key].sizes[size]=(groups[key].sizes[size]||0)+qty;
    groups[key].total+=qty;
    seen.add(size);
  });
  const sizeCols=[...seen].sort((a,b)=>((SIZE_RANK[a]??99)-(SIZE_RANK[b]??99))||a.localeCompare(b));
  return {groups:Object.values(groups), sizeCols, fees};
}

// Build the full standalone HTML document for the print window.
function renderSheetHTML(order, rows){
  const {groups, sizeCols, fees}=buildSizeSheet(rows);
  const grand=groups.reduce((s,g)=>s+g.total,0);

  const garmentHTML=groups.map(g=>{
    const head='<div class="g-head">'
      +'<span class="g-title">'+esc(g.product)+'</span>'
      +(g.color?'<span class="g-swatch">'+esc(g.color)+'</span>':'')

// Open a new window and populate it with the printable sheet for one order.
function openOrderSheet(o){
  const w=window.open('','_blank');
  if(!w) return; // popup blocked
  w.document.write('<p style="font-family:Arial;padding:24px;color:#666">Loading order sheet…</p>');
  fetch('/api/order-sizes?orderId='+encodeURIComponent(o.id),{headers:{Accept:'application/json'}})
    .then(r=>r.json())
    .then(d=>{
      const rows=(d&&d.records)||[];
      const html=renderSheetHTML({goa:o.num,name:o.name,account:o.acct,mockup:o.mockupUrl}, rows);
      w.document.open(); w.document.write(html); w.document.close();
    })
    .catch(e=>{
      w.document.body.innerHTML='<p style="font-family:Arial;padding:24px">Could not load size data: '+(e&&e.message||'error')+'</p>';
    });
}

// Read-only "sheet" row for one Pre_Production_Item__c -- logged with every
// property relevant to its type (same fields the Pre-Production Dashboard's
// worker board edits), just display-only here since editing happens upstream.
function ppItemRow(it){
  const type=it.Type__c||'—';
  const extra=[];
  if(type==='Screen') extra.push(['Screen Sub-Status',it.Screen_Sub_Status__c],['Mesh Count',it.Mesh_Count__c]);
  else if(type==='Ink') extra.push(['Ink Sub-Status',it.Ink_Sub_Status__c],['Pantone Color',it.Pantone_Color__c]);
  else if(type==='Thread') extra.push(['Thread Color',it.Thread_Color__c],['Thread Number',it.Thread_Number__c]);
  else if(type==='Digitization') extra.push(['Stitch Count',it.Stitch_Count__c]);
  else if(type==='Transfer') extra.push(['Transfers Sub-Status',it.Transfers_Sub_Status__c],['Transfer Type',it.Transfer_Type__c]);
  if(it.Notes__c) extra.push(['Notes',it.Notes__c]);
  const map={'Ready':'#1E2D0E|#E7F2D2','In Progress':'#281C09|#E0B870','Not Started':'#1A1A1C|#9C988F'};
  const c=(map[it.Status__c]||'#1A1A1C|#9C988F').split('|');
  return '<div style="background:var(--panel);border:1px solid var(--line);border-radius:var(--rad-sm);padding:10px 12px;margin-bottom:8px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:'+(extra.length?'6px':'0')+'">'
    +'<span style="font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#ECEAE4">'+esc(type)+'</span>'
    +(it.Name?'<span style="font-size:11px;color:var(--ink4)">'+esc(it.Name)+'</span>':'')
    +'<span class="badge" style="background:'+c[0]+';color:'+c[1]+'">'+esc(it.Status__c||'—')+'</span>'
    +(it.Production_Method__r&&it.Production_Method__r.Type__c?'<span style="margin-left:auto;font-size:11px;color:var(--ink4)">'+esc(it.Production_Method__r.Type__c)+'</span>':'')
    +'</div>'
    +extra.filter(([,v])=>v!=null&&v!=='').map(([lbl,v])=>'<div style="display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:4px 0;border-top:1px solid var(--line)"><span style="color:var(--ink4)">'+esc(lbl)+'</span><span style="color:var(--ink2);font-weight:500;text-align:right">'+esc(String(v))+'</span></div>').join('')
    +'</div>';
}
function ppItemsPanel(o){
  const st=ppItems[o.id];
  let h='<div class="fieldwrap"><span class="fieldlbl">Production Items</span>';
  if(!st||st.loading){ h+='<p style="font-size:12px;color:#6E6A62">Loading items…</p>'; }
  else if(st.error){ h+='<p style="font-size:12px;color:#E8A89F">'+esc(st.error)+'</p>'; }
  else if(!st.items.length){ h+='<p style="font-size:12px;color:#6E6A62">No production items recorded for this order.</p>'; }
  else{ h+=st.items.map(ppItemRow).join(''); }
  h+='</div>';
  return h;
}
async function loadPpItems(orderId){
  if(ppItems[orderId]&&!ppItems[orderId].error) return;
  ppItems[orderId]={loading:true,error:null,items:[]};
  renderCur();
  try{
    const r=await fetch('/api/pre-production-items?orderId='+encodeURIComponent(orderId),{headers:{Accept:'application/json'}});
    const d=await r.json();
    if(!r.ok) throw new Error((d&&d.error)||('Failed '+r.status));
    ppItems[orderId]={loading:false,error:null,items:(d.records||[])};
  }catch(e){ ppItems[orderId]={loading:false,error:'Could not load items: '+e.message,items:[]}; }
  renderCur();
}

// Live start/stop stopwatch for Print_Setup_Timer__c / Production_Timer__c.
function timerBlock(o,kind){
  const label=kind==='setup'?'Print Setup Timer':'Production Timer';
  const savKey=kind==='setup'?'setupTimer':'timer';
  const running=!!timerRun[timerKey(o.id,kind)];
  return '<div class="fieldwrap"><span class="fieldlbl">'+label+(o.sav[savKey]?' <i class="ti ti-loader sav-tag" aria-hidden="true"></i>':'')+'</span>'
    +'<div style="display:flex;align-items:center;gap:12px;background:var(--chip);border:1px solid var(--line);border-radius:var(--rad-sm);padding:12px 14px">'
    +'<span data-tmr="'+kind+'" data-tsid="'+o.id+'" style="font-family:var(--cond);font-size:22px;font-weight:700;color:'+(running?'#7FA644':'#ECEAE4')+';min-width:64px">'+fmtHMS(timerElapsedSec(o,kind))+'</span>'
    +'<button class="actbtn'+(running?'':' ghost')+'" style="width:auto;margin:0;padding:9px 16px;flex:1" data-a="'+(running?'timer-stop':'timer-start')+'" data-sid="'+o.id+'" data-v="'+kind+'">'
    +'<i class="ti ti-'+(running?'player-pause':'player-play')+'" aria-hidden="true"></i> '+(running?'Stop':'Start')
    +'</button>'
    +'<span style="font-size:11px;color:'+(running?'#7FA644':'var(--ink4)')+';white-space:nowrap">'+(running?'Running…':'Logged: '+fmtMinSec(o[savKey]))+'</span>'
    +'</div></div>';
}

    +DELIVERY_METHODS.map(m=>'<option value="'+esc(m)+'"'+(o.delivery===m?' selected':'')+'>'+esc(m)+'</option>').join('')
    +'</select></div>'
    +'<div class="fieldwrap"><span class="fieldlbl">Packaging Count'+(o.sav.packaging?' <i class="ti ti-loader sav-tag" aria-hidden="true"></i>':'')+'</span>'
    +'<input type="number" min="0" placeholder="Number of boxes" value="'+(o.packaging===''?'':o.packaging)+'" data-fi="'+o.id+'" data-ff="Packaging_Count__c" data-fk="packaging"></div>'
    +pkgSection(o)
    +shipSection(o)
    +'<button class="actbtn" data-a="label" data-sid="'+o.id+'"><i class="ti ti-printer" aria-hidden="true"></i> Print Shipping Label</button>';
}

/* ── Completed ── */

// Read-only "logged so far" readout for a timer — no Start/Stop controls,
// since a completed order's timers are historical record, not something to
// resume. Mirrors timerBlock()'s numbers exactly (fmtMinSec of the same
// saved-seconds field).
function timerReadout(o,kind){
  const label=kind==='setup'?'Print Setup Timer':'Production Timer';
  const savKey=kind==='setup'?'setupTimer':'timer';
  return '<div class="fieldwrap"><span class="fieldlbl">'+label+'</span>'
    +'<div style="font-size:14px;font-weight:600;color:#ECEAE4;background:var(--chip);border:1px solid var(--line);border-radius:var(--rad-sm);padding:10px 14px">'+fmtMinSec(o[savKey])+'</div></div>';
}

// Full backlog record for one completed order -- everything a manager would
// need to evaluate a reorder without re-opening Salesforce: mockup, garment
// size breakdown + printable order sheet, logged setup/production time, every
// production item (screens/ink/thread/digitization/transfers) with its
// type-specific details, packaging logged, shipments logged, production
// notes, and misprint details. Hidden behind "Inspect Order Details" so the
// Completed tab itself stays a fast-scanning backlog list.
function doneDetailHTML(o){
  return mockupHTML(o)
    +sizeTableHTML(o)
    +timerReadout(o,'setup')
    +timerReadout(o,'prod')
    +ppItemsPanel(o)
    +pkgSection(o)
    +shipSection(o)
    +(o.notes?'<div class="fieldwrap"><span class="fieldlbl">Production Notes</span><p style="font-size:13px;color:#C9C6BF;white-space:pre-wrap;line-height:1.5;margin:0">'+esc(o.notes)+'</p></div>':'')
    +(o.misprint?'<div class="fieldwrap"><span class="fieldlbl">Misprint Details</span><p style="font-size:13px;color:#E8A89F;white-space:pre-wrap;line-height:1.5;margin:0">'+esc(o.misprintDetails||'—')+'</p></div>':'');
}

function donePanel(o){
  const insp=!!doneInspect[o.id];
  return stepperHTML(o)
    +'<div class="fieldwrap"><span class="fieldlbl">Delivery Method</span><div style="font-size:13px;color:#C9C6BF">'+esc(o.delivery||'—')+'</div></div>'
    +'<div class="fieldwrap"><span class="fieldlbl">Packaging Count</span><div style="font-size:13px;color:#C9C6BF">'+(o.packaging===''?'—':o.packaging)+'</div></div>'
    +'<div class="fieldwrap"><span class="fieldlbl">Shipping Label</span>'
    +(o.labelPrinted?'<span class="badge" style="background:var(--grn-bg);color:var(--grn-tx)"><i class="ti ti-check" aria-hidden="true"></i> Printed</span>':'<span class="badge" style="background:var(--chip);color:var(--ink2)">Not printed</span>')
    +'</div>'
    +(o.misprint?'<div class="fieldwrap"><span class="fieldlbl">Misprint</span><span class="badge" style="background:var(--red-bg);color:var(--red-tx)"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Flagged</span></div>':'')
    +'<button class="actbtn ghost" data-a="inspect" data-sid="'+o.id+'" style="margin-bottom:14px"><i class="ti ti-'+(insp?'chevron-up':'file-search')+'" aria-hidden="true"></i> '+(insp?'Hide Order Details':'Inspect Order Details')+'</button>'
    +(insp?doneDetailHTML(o):'')
    +'<button class="actbtn ghost" data-a="label" data-sid="'+o.id+'"><i class="ti ti-printer" aria-hidden="true"></i> Reprint Shipping Label</button>';
}

/* ── Shipping label (printable sheet) ──
   Purely a reference printout: address plus whatever carrier/tracking
   info has been logged via shipSection() (the real label itself is
   bought through the Zenkraft wizard in Salesforce, not here). Pulls the
   most recently logged shipment for this order if one has been loaded. */
function openShippingLabel(o){
  const w=window.open('','_blank');
  if(!w) return;
  const addrLines=[o.addr.street,[o.addr.city,o.addr.state,o.addr.postalCode].filter(Boolean).join(', '),o.addr.country].filter(Boolean);
  const ship=shipItems[o.id]&&shipItems[o.id].items&&shipItems[o.id].items[0];
  const shipLines=[];
  if(ship){
    if(ship.zkmulti__Carrier__c||ship.zkmulti__Service_Type_Name__c) shipLines.push([ship.zkmulti__Carrier__c,ship.zkmulti__Service_Type_Name__c].filter(Boolean).join(' · '));
    if(ship.zkmulti__Tracking_Number__c) shipLines.push('Tracking #'+ship.zkmulti__Tracking_Number__c);
    if(ship.Weight!=null) shipLines.push(ship.Weight+' '+(ship.WeightUnits||'lbs'));
  }
  const html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Shipping Label — '+esc(o.num)+'</title><style>'
    +'body{font-family:Arial,sans-serif;padding:40px;color:#111}'
    +'.label{border:2px solid #111;border-radius:10px;padding:28px;max-width:480px}'
    +'.from{font-size:11px;color:#666;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #ccc}'
    +'.to-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:6px}'
    +'.to{font-size:20px;font-weight:700;margin-bottom:4px}'
    +'.addr{font-size:16px;line-height:1.5}'
    +'.meta{margin-top:20px;padding-top:14px;border-top:1px solid #ccc;font-size:12px;color:#444}'
    +'.ship{margin-top:12px;padding-top:12px;border-top:1px dashed #ccc;font-size:13px;color:#111;font-weight:600}'
    +'.bar{margin-top:6px}'
    +'</style></head><body>'
    +'<div class="label">'
    +'<div class="from">Culture Apparel Print Shop</div>'
    +'<div class="to-lbl">Ship To</div>'
    +'<div class="to">'+esc(o.acct)+'</div>'
    +(addrLines.length?'<div class="addr">'+addrLines.map(esc).join('<br>')+'</div>':'<div class="addr" style="color:#c00">No shipping address on file for this order — check the Account in Salesforce.</div>')
    +'<div class="meta">Order #'+esc(o.num)+(o.name?' · '+esc(o.name):'')+(o.delivery?' · '+esc(o.delivery):'')+'</div>'
    +(shipLines.length?'<div class="ship">'+shipLines.map(esc).join('<br>')+'</div>':'')
    +'</div>'
    +'<div class="bar"><button onclick="window.print()" style="margin-top:20px;padding:10px 18px;font-size:13px;cursor:pointer">Print / Save PDF</button></div>'
    +'</body></html>';
  w.document.write(html);
  w.document.close();
}

/* ══════════════════════════════════════
   EVENTS
══════════════════════════════════════ */
document.body.addEventListener('click',function(e){
  const t=e.target.closest('[data-a]');
  if(!t) return;
  const{a,sid,v,pid}=t.dataset;
  const o=ALL.find(x=>x.id===sid);
  if(a==='toggle'){
    openO[sid]=!openO[sid];
    if(openO[sid]){
      const oo=ALL.find(x=>x.id===sid);
      if(oo&&oo.stageKey==='ip'){ loadPpItems(sid); loadPkgItems(sid); }
      if(oo&&oo.stageKey==='pp'){ loadPpItems(sid); loadPkgItems(sid); loadShipments(sid); }
    }
    renderCur();return;
  }
  if(!o) return;
  if(a==='inspect'){
    doneInspect[sid]=!doneInspect[sid];
    if(doneInspect[sid]){ loadPpItems(sid); loadPkgItems(sid); loadShipments(sid); }
    renderCur();return;
  }
  if(a==='advance'){
    if(o.sav.substatus||o.substatus===v) return;
    advanceStage(o,v);return;
  }
  if(a==='ck'){
    if(o.sav.misprint) return;
    patchField(sid,'Misprint__c',v!=='true',o,'misprint');return;
  }
  if(a==='label'){
    openShippingLabel(o);
    // Printing the label marks it printed and completes the order.
    if(!o.labelPrinted) patchField(sid,'Shipping_Label_Printed__c',true,o,'labelPrinted');
    if(o.substatus!=='Completed') advanceStage(o,'Completed');
    return;
  }
  if(a==='ordersheet'){
    openOrderSheet(o);
    return;
  }
  if(a==='timer-start'){
    const savKey=v==='setup'?'setupTimer':'timer';
    if(o.sav[savKey]||timerRun[timerKey(sid,v)]) return;
    timerRun[timerKey(sid,v)]=Date.now();
    saveTimerRun();
    renderCur();
    return;
  }
  if(a==='timer-stop'){
    const savKey=v==='setup'?'setupTimer':'timer';
    const field=v==='setup'?'Print_Setup_Timer__c':'Production_Timer__c';
    const key=timerKey(sid,v);
    const startedAt=timerRun[key];
    if(!startedAt||o.sav[savKey]) return;
    delete timerRun[key];
    saveTimerRun();
    const liveSec=Math.max(0,Math.floor((Date.now()-startedAt)/1000));
    const newSec=(o[savKey]||0)+liveSec;
    patchField(sid,field,newSec,o,savKey);
    return;
  }
  if(a==='pkg-add'){
    if(pkgSaving[sid]) return;
    const typeEl=document.getElementById('pkg-type-'+sid);
    const qtyEl=document.getElementById('pkg-qty-'+sid);
    const type=typeEl?typeEl.value:'';
    const qty=qtyEl?qtyEl.value:'';
    if(!type){ pkgErr[sid]='Choose a package type.'; renderCur(); return; }
    if(!qty||Number(qty)<=0){ pkgErr[sid]='Enter how many garments are in this package.'; renderCur(); return; }
    pkgSaving[sid]=true; pkgErr[sid]=null; renderCur();
    fetch('/api/packaging',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderId:sid,Packaging_Type__c:type,Quantity__c:Number(qty)})})
      .then(async r=>{
        const d=await r.json().catch(()=>({}));
        if(!r.ok) throw new Error((d&&d.error)||('Failed '+r.status));
        delete pkgItems[sid];
        return loadPkgItems(sid);
      })
      .catch(e=>{ pkgErr[sid]='Could not log package: '+e.message; renderCur(); })
      .finally(()=>{ pkgSaving[sid]=false; renderCur(); });
    return;
  }
  if(a==='pkg-del'){
    if(!pid) return;
    if(!confirm('Remove this package log entry?')) return;
    fetch('/api/packaging/'+encodeURIComponent(pid),{method:'DELETE'})
      .then(async r=>{
        if(!r.ok){ const d=await r.json().catch(()=>({})); throw new Error((d&&d.error)||('Failed '+r.status)); }
        if(pkgItems[sid]) pkgItems[sid].items=pkgItems[sid].items.filter(p=>p.Id!==pid);
        renderCur();
      })
      .catch(e=>alert('Could not remove package: '+e.message));
    return;
  }
  if(a==='ship-add'){
    if(shipSaving[sid]) return;
    const carrierEl=document.getElementById('ship-carrier-'+sid);
    const serviceEl=document.getElementById('ship-service-'+sid);
    const trackEl=document.getElementById('ship-track-'+sid);
    const weightEl=document.getElementById('ship-weight-'+sid);
    const carrier=carrierEl?carrierEl.value.trim():'';
    const service=serviceEl?serviceEl.value.trim():'';
    const track=trackEl?trackEl.value.trim():'';
    const weight=weightEl?weightEl.value:'';
    if(!carrier){ shipErr[sid]='Enter a carrier.'; renderCur(); return; }
    if(!track){ shipErr[sid]='Enter a tracking number.'; renderCur(); return; }
    shipSaving[sid]=true; shipErr[sid]=null; renderCur();
    fetch('/api/shipments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderId:sid,Carrier:carrier,ServiceType:service,TrackingNumber:track,Weight:weight?Number(weight):null})})
      .then(async r=>{
        const d=await r.json().catch(()=>({}));
        if(!r.ok) throw new Error((d&&d.error)||('Failed '+r.status));
        delete shipItems[sid];
        return loadShipments(sid);
      })
      .catch(e=>{ shipErr[sid]='Could not log shipment: '+e.message; renderCur(); })
      .finally(()=>{ shipSaving[sid]=false; renderCur(); });
    return;
  }
  if(a==='ship-del'){
    if(!pid) return;
    if(!confirm('Remove this shipment log entry?')) return;
    fetch('/api/shipments/'+encodeURIComponent(pid),{method:'DELETE'})
      .then(async r=>{
        if(!r.ok){ const d=await r.json().catch(()=>({})); throw new Error((d&&d.error)||('Failed '+r.status)); }
        if(shipItems[sid]) shipItems[sid].items=shipItems[sid].items.filter(s=>s.Id!==pid);
        renderCur();
      })
      .catch(e=>alert('Could not remove shipment: '+e.message));
    return;
  }
});

document.body.addEventListener('change',function(e){
  const t=e.target;
  const oid=t.dataset.fi, field=t.dataset.ff, key=t.dataset.fk;
  if(!oid||!field) return;
  const o=ALL.find(x=>x.id===oid);
  if(!o) return;
  let val=t.value;
  if(t.type==='number') val=val===''?null:Number(val);
  patchField(oid,field,val,o,key);
});

// Auto-login if a role is already stored from logging into the other dashboard.
// Must run after every let/const above it is initialized (curStage, ALL, etc.)
// -- this used to sit up near the login functions and threw a TDZ
// ReferenceError on curStage, which silently killed init before doLoad() ever
// ran, leaving the header stuck on its static "Loading…" text.
(function(){
  let saved=null;
  try{saved=localStorage.getItem(CA_ROLE_KEY);}catch(_){}
  if(saved==='worker'||saved==='manager') enterApp();
})();

})();
</script>
